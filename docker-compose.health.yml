# ShopAI HEALTH / UPTIME monitoring stack.
#
# Purpose: a single "is everything up?" view + alerts. Run this on a THIRD,
# always-on host (small NUC / Raspberry Pi / spare box) — NOT on the Backend VM
# or GPU PC — so it keeps reporting when one of those goes down.
#
# It needs NO database credentials (pure Prometheus/blackbox), so it starts on
# any machine with just one value set:
#   cp .env.example .env && edit GRAFANA_ADMIN_PASSWORD
#   docker compose -f docker-compose.health.yml --env-file .env up -d
# Open:  http://<this-host>:3000   (admin / GRAFANA_ADMIN_PASSWORD)
#
# Monitored hosts run docker-compose.agent.yml (node-exporter + cadvisor).
# Edit IPs in monitoring/prometheus/prometheus.health.yml if your hosts move.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: shopai-health-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.health.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts-health.yml:/etc/prometheus/alerts-health.yml:ro
      # backend /metrics token (gitignored; cp backend_sd.json.example backend_sd.json)
      - ./monitoring/prometheus/backend_sd.json:/etc/prometheus/backend_sd.json:ro
      - health_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: shopai-health-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - health_alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  blackbox:
    image: prom/blackbox-exporter:latest
    container_name: shopai-health-blackbox
    restart: unless-stopped
    # ICMP probing needs the raw-socket capability.
    cap_add:
      - NET_RAW
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"

  grafana:
    image: grafana/grafana:latest
    container_name: shopai-health-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Land on the service-health screen by default.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/shopai-service-health.json
      # PostgreSQL datasource (SQL-table panels). Needs the read-only user from
      # sql/grafana_readonly_user.sql; leave password unset to skip those panels.
      SHOPAI_DB_HOST: 192.168.0.6
      SHOPAI_DASHBOARD_DB_PASSWORD: ${SHOPAI_DASHBOARD_DB_PASSWORD:-unset}
    volumes:
      - health_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  health_prometheus_data:
  health_alertmanager_data:
  health_grafana_data:
