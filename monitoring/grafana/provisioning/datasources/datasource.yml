apiVersion: 1

datasources:
  - name: Prometheus
    uid: shopai-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: ShopAI PostgreSQL
    uid: shopai-postgres
    type: postgres
    access: proxy
    url: db:5432
    database: shopai
    user: shopai_dashboard
    secureJsonData:
      # Expanded from the grafana container env (see docker-compose.monitoring.yml).
      password: ${SHOPAI_DASHBOARD_DB_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      maxOpenConns: 2
      maxIdleConns: 1
      connMaxLifetime: 14400
    editable: false
