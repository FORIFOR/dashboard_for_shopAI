global:
  scrape_interval: 10s
  evaluation_interval: 10s

# Alert rules live alongside this file (mounted into the container).
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: shopai-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080        # FastAPI backend, same docker network as Prometheus

  - job_name: shopai-vllm
    metrics_path: /metrics
    static_configs:
      - targets:
          - 192.168.0.15:8000   # GPU PC, vLLM serving "shopai-fast"

  # GPU metrics: nvidia-smi exporter on the GPU PC is the PRIMARY source.
  # docker requires sudo on the GPU PC and GeForce DCGM is unreliable, so we
  # use the nvidia-smi exporter (verified working on the RTX 5070 Ti).
  - job_name: shopai-gpu
    static_configs:
      - targets:
          - 192.168.0.15:9401

  # ALTERNATIVE GPU source — DCGM exporter container. Enable instead of the job
  # above only if you ran run_dcgm_exporter.sh and confirmed the fields exist.
  # - job_name: shopai-gpu-dcgm
  #   static_configs:
  #     - targets:
  #         - 192.168.0.15:9400

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: backend-node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080   # cadvisor's internal port (host-mapped to 8081)
